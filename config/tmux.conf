# WSL tmux config
# Adapted from macOS dotfiles — removed Ghostty / macOS-specific entries

# on the new machine, install tpm first
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# entering tmux and plugings will be installed automatically

# claude recommended
set -g focus-events on

set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

#set-option -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"
set -g terminal-overrides ",xterm-256color:Tc"
set -g allow-passthrough on

# action key
unbind C-b
set -g prefix C-t

set -g escape-time 0
set -g repeat-time 50
set -g history-limit 64096


#### Key bindings
set-window-option -g mode-keys vi

#bind t send-key C-t
# Reload settings
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Open current directory
bind o run-shell "xdg-open #{pane_current_path}"
bind -r e kill-pane -a

# split
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Switching window (移至 tpm 初始化後)

# 禁止程式改視窗名稱，自動用目錄名稱
set-option -g allow-rename off
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Moving window
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Resizing pane
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

#### basic settings
set-option -g status-justify "left"

#set-option utf8-default on
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# look'n feel
set -g status-fg green
set -g status-bg black
# set -g pane-active-border-style fg=colour166,bg=default


#### COLOUR (Tokyo Night)
set -g window-style fg=#565f89,bg=default
set -g window-active-style fg=#7aa2f7,bg=default

set -g status-style bg=#1a1b26,fg=#c0caf5
set -g status-left "#[fg=#7aa2f7]#S #[fg=#c0caf5]|"
set -g status-right "#[fg=#c0caf5]%Y-%m-%d %H:%M"

# pane border
set -g pane-border-lines simple
set -g pane-border-style fg=#3b4261
set -g pane-active-border-style fg=#7aa2f7

# message text
# set-option -g message-style bg=colour235,fg=colour166

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# clock
set-window-option -g clock-mode-colour colour64 #green

# allow the title bar to adapt to whatever host you connect to
# set -g set-titles on
# set -g set-titles-string "#T"

# Panel Look
set -g status on
set -g status-interval 2
set -g status-left-length 60
set -g status-left ''

# 0: name
# set -g window-status-separator ''
set -g window-status-format "#[fg=colour245] #I:#W "
set -g window-status-current-format "#[fg=colour255] #I:#W "


# PLUG MANAGER
# -- Install -- prefix: Ctrl-t
# Add new plugin to ~/.tmux.conf with set -g @plugin '...'
# Press prefix + I (capital i, as in Install) to fetch the plugin.

# -- Uninstall --
# Remove (or comment out) plugin from the list.
# Press prefix + alt + u (lowercase u as in uninstall) to remove the plugin.
# or just run ~/.tmux/plugins/tpm/bin/clean_plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# 放在 tpm 初始化後，避免被插件覆蓋
# 解除 tmux-sensible 設定的 root 綁定（不需要 prefix 就能觸發的）
unbind-key -T root C-n
unbind-key -T root C-p
# 重新綁定到 prefix table
bind-key C-p previous-window
bind-key C-n next-window

set -g default-shell /usr/bin/fish
set -g default-command "/usr/bin/fish -l"
